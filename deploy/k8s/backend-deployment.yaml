apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpdesk-backend
  labels:
    app: helpdesk-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helpdesk-backend
  template:
    metadata:
      labels:
        app: helpdesk-backend
    spec:
      containers:
      - name: backend
        image: helpdesk-backend:latest
        ports:
        - containerPort: 7860
        envFrom:
        - secretRef:
            name: helpdesk-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 7860
          initialDelaySeconds: 60
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: helpdesk-backend-svc
spec:
  selector:
    app: helpdesk-backend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 7860
  type: ClusterIP
