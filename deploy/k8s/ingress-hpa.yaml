apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: helpdesk-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: helpdesk-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helpdesk-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.helpdesk.ai
    secretName: helpdesk-tls
  rules:
  - host: api.helpdesk.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: helpdesk-backend-svc
            port:
              number: 80
