#     read_recent: true

# ------------------------------------------------------------------------------
# Additional Production Hardening Tips (commented)
# ------------------------------------------------------------------------------
# 1. Use environment‐specific token files with restrictive permissions (0600).
# 2. Enable TLS for all metrics endpoints in production.
# 3. Set `scrape_interval` higher than `scrape_timeout` for each job.
# 4. Use `sample_limit` to prevent overload from misconfigured exporters.
# 5. Place recording rules to aggregate high‑cardinality metrics into lower
#    cardinality ones (e.g., average latency by service).
# 6. Configure `grpc_compression` for remote write if network bandwidth is a concern.